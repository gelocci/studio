services:
  postgres:
    image: postgres:16-alpine
    container_name: gelocci-studio-postgres
    environment:
      POSTGRES_DB: gelocci_studio
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
    ports:
      - "5433:5432"
    volumes:
      - studio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d gelocci_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gelocci-studio-redis
    ports:
      - "6380:6379"
    volumes:
      - studio-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  studio-postgres-data:
  studio-redis-data:
